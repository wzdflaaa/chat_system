<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>智能对话系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="user-box">
        <strong>{{ username }}</strong>
        <small>角色：{{ role }}</small>
      </div>
      <button id="new-conv">+ 新建会话</button>
      <div class="model-entry">
        <p>模型切换入口</p>
        <select id="model-name">
          <option value="mock">mock（默认）</option>
          <option value="deepseek">deepseek（需 API Key）</option>
        </select>
      </div>
      <div class="placeholder">向量数据库入口（预留）</div>
      <div class="placeholder">复杂缓存入口（预留）</div>
      <ul class="conv-list">
        {% for c in conversations %}
        <li class="{% if c.id == current_id %}active{% endif %}">
          <a href="{{ url_for('chat_page', conversation_id=c.id) }}">{{ c.title }}</a>
        </li>
        {% endfor %}
      </ul>
      <a href="{{ url_for('logout') }}">退出登录</a>
    </aside>

    <main>
      <div id="messages" class="messages">
        {% for m in messages %}
          <div class="msg {{ m.role }}" data-id="{{ m.id }}">
            <div class="meta">{{ m.role }} · {{ m.created_at }}</div>
            <pre>{{ m.content }}</pre>
            <div class="actions">
              <button onclick="editMessage({{ m.id }})">编辑</button>
              <button onclick="deleteMessage({{ m.id }})">删除</button>
            </div>
          </div>
        {% endfor %}
      </div>
      <div class="input-box">
        <textarea id="input" placeholder="输入你的问题..."></textarea>
        <button id="send">发送</button>
      </div>
    </main>
  </div>

<script>
const currentId = {{ current_id or 'null' }};

document.getElementById('new-conv').onclick = async () => {
  const title = prompt('请输入会话标题', '新会话');
  if (!title) return;
  const modelName = document.getElementById('model-name').value;
  const resp = await fetch('/api/conversations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, model_name: modelName})
  });
  const data = await resp.json();
  location.href = `/chat?conversation_id=${data.conversation_id}`;
};

document.getElementById('send').onclick = async () => {
  if (!currentId) {
    alert('请先创建会话');
    return;
  }
  const textEl = document.getElementById('input');
  const content = textEl.value.trim();
  if (!content) return;

  const box = document.getElementById('messages');
  box.insertAdjacentHTML('beforeend', `<div class="msg user"><div class="meta">user</div><pre>${content}</pre></div>`);
  const assistantNode = document.createElement('div');
  assistantNode.className = 'msg assistant';
  assistantNode.innerHTML = `<div class="meta">assistant(流式)</div><pre></pre>`;
  box.appendChild(assistantNode);
  box.scrollTop = box.scrollHeight;
  textEl.value = '';

  const resp = await fetch(`/api/conversations/${currentId}/messages`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({content})
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const {value, done} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream:true});
    const events = buf.split('\n\n');
    buf = events.pop();
    for (const ev of events) {
      if (!ev.startsWith('data: ')) continue;
      const payload = JSON.parse(ev.slice(6));
      if (payload.delta) {
        assistantNode.querySelector('pre').textContent += payload.delta;
      }
      if (payload.error) {
        assistantNode.querySelector('pre').textContent += `\n[错误] ${payload.error}`;
      }
    }
  }
  setTimeout(()=>location.reload(), 400);
};

async function editMessage(id) {
  const content = prompt('输入新的消息内容');
  if (!content) return;
  await fetch(`/api/messages/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({content})
  });
  location.reload();
}

async function deleteMessage(id) {
  if (!confirm('确认删除该消息？')) return;
  await fetch(`/api/messages/${id}`, {method: 'DELETE'});
  location.reload();
}
</script>
</body>
</html>
