<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>智能对话系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="user-box">
        <strong>{{ username }}</strong>
        <small>角色：{{ role }}</small>
      </div>

      <button id="new-conv">+ 新建会话</button>

      <div class="model-entry">
        <p>模型切换入口</p>
        <select id="model-name">
          <option value="deepseek" selected>deepseek（默认，需 API Key）</option>
          <option value="mock">mock（本地演示）</option>
        </select>
      </div>
      
      <ul class="conv-list">
        {% for c in conversations %}
        <li class="{% if c.id == current_id %}active{% endif %}">
          <a href="{{ url_for('chat_page', conversation_id=c.id) }}">{{ c.title }}</a>
        </li>
        {% endfor %}
      </ul>

      <a href="{{ url_for('logout') }}">退出登录</a>
    </aside>

    <main>
      <div id="messages" class="messages">
        {% for m in messages %}
          <div class="msg {{ m.role }}" data-id="{{ m.id }}">
            <div class="meta">{{ m.role }} · {{ m.created_at }}</div>

            {% if m.role == 'assistant' %}
              <div class="assistant-content markdown-body" data-content="{{ m.content | e }}"></div>
            {% else %}
              <pre class="user-content">{{ m.content }}</pre>
            {% endif %}

            <div class="actions">
              <button onclick="editMessage({{ m.id }})">编辑</button>
              <button onclick="deleteMessage({{ m.id }})">删除</button>
            </div>
          </div>
        {% endfor %}
      </div>

      <div class="input-box">
        <textarea id="input" placeholder="输入你的问题..."></textarea>
        <button id="send">发送</button>
      </div>
    </main>
  </div>

<script>
const currentId = {{ current_id or 'null' }};

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function copyText(text, button) {
  navigator.clipboard.writeText(text).then(() => {
    const oldText = button.textContent;
    button.textContent = '已复制';
    button.classList.add('copied');
    setTimeout(() => {
      button.textContent = oldText;
      button.classList.remove('copied');
    }, 1200);
  }).catch(() => {
    const oldText = button.textContent;
    button.textContent = '复制失败';
    setTimeout(() => {
      button.textContent = oldText;
    }, 1200);
  });
}

function tableToText(table) {
  const rows = [];
  for (const tr of table.querySelectorAll('tr')) {
    const cols = [];
    for (const cell of tr.querySelectorAll('th, td')) {
      cols.push(cell.innerText.replace(/\n+/g, ' ').trim());
    }
    rows.push(cols.join('\t'));
  }
  return rows.join('\n');
}

function addCopyButtons(container) {
  if (!container) return;

  // 给代码块加复制按钮
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement && pre.parentElement.classList.contains('code-block-wrap')) {
      return;
    }

    const code = pre.querySelector('code');
    const codeText = code ? code.innerText : pre.innerText;

    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrap';

    const toolbar = document.createElement('div');
    toolbar.className = 'copy-toolbar';

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制代码';
    btn.onclick = () => copyText(codeText, btn);

    toolbar.appendChild(btn);

    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(toolbar);
    wrapper.appendChild(pre);
  });

  // 给表格加复制按钮
  container.querySelectorAll('table').forEach(table => {
    if (table.parentElement && table.parentElement.classList.contains('table-wrap')) {
      return;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'table-wrap';

    const toolbar = document.createElement('div');
    toolbar.className = 'copy-toolbar';

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制表格';
    btn.onclick = () => copyText(tableToText(table), btn);

    toolbar.appendChild(btn);

    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(toolbar);
    wrapper.appendChild(table);
  });
}

function renderMarkdownContent(el, text) {
  el.innerHTML = marked.parse(text || '');
  addCopyButtons(el);
}

function initAssistantMarkdown() {
  document.querySelectorAll('.assistant-content').forEach(el => {
    const raw = el.getAttribute('data-content') || '';
    renderMarkdownContent(el, raw);
  });
}

document.getElementById('new-conv').onclick = async () => {
  const modelName = document.getElementById('model-name').value;

  const resp = await fetch('/api/conversations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: '新会话',
      model_name: modelName
    })
  });

  const data = await resp.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  location.href = `/chat?conversation_id=${data.conversation_id}`;
};

document.getElementById('send').onclick = async () => {
  if (!currentId) {
    alert('请先创建会话');
    return;
  }

  const textEl = document.getElementById('input');
  const content = textEl.value.trim();
  if (!content) return;

  const box = document.getElementById('messages');

  box.insertAdjacentHTML(
    'beforeend',
    `
    <div class="msg user">
      <div class="meta">user</div>
      <pre class="user-content">${escapeHtml(content)}</pre>
    </div>
    `
  );

  const assistantNode = document.createElement('div');
  assistantNode.className = 'msg assistant';
  assistantNode.innerHTML = `
    <div class="meta">assistant · 正在生成</div>
    <div class="assistant-content markdown-body"></div>
  `;
  box.appendChild(assistantNode);
  box.scrollTop = box.scrollHeight;
  textEl.value = '';

  const assistantContentEl = assistantNode.querySelector('.assistant-content');
  const assistantMetaEl = assistantNode.querySelector('.meta');

  const resp = await fetch(`/api/conversations/${currentId}/messages`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({content})
  });

  if (!resp.ok) {
    assistantContentEl.textContent = `请求失败，状态码：${resp.status}`;
    assistantMetaEl.textContent = 'assistant · 请求失败';
    return;
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let fullText = '';

  while (true) {
    const {value, done} = await reader.read();
    if (done) break;

    buf += decoder.decode(value, {stream: true});
    const events = buf.split('\n\n');
    buf = events.pop();

    for (const ev of events) {
      if (!ev.startsWith('data: ')) continue;

      const payload = JSON.parse(ev.slice(6));

      if (payload.delta) {
        fullText += payload.delta;
        renderMarkdownContent(assistantContentEl, fullText);
        box.scrollTop = box.scrollHeight;
      }

      if (payload.error) {
        fullText += `\n\n> [错误] ${payload.error}`;
        renderMarkdownContent(assistantContentEl, fullText);
        assistantMetaEl.textContent = 'assistant · 出错';
      }

      if (payload.done) {
        assistantMetaEl.textContent = 'assistant';
      }
    }
  }

  setTimeout(() => location.reload(), 400);
};

async function editMessage(id) {
  const content = prompt('输入新的消息内容');
  if (!content) return;

  await fetch(`/api/messages/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({content})
  });

  location.reload();
}

async function deleteMessage(id) {
  if (!confirm('确认删除该消息？')) return;

  await fetch(`/api/messages/${id}`, {method: 'DELETE'});
  location.reload();
}

initAssistantMarkdown();
</script>
</body>
</html>
